[test]
coverage = true
coverageThreshold = 1.0
coverageReporter = ["text", "lcov"]
coveragePathIgnorePatterns = [
  "**/dist/**",
  "**/node_modules/**",
  "**/*.test.ts",
  "**/tests/**",
  "**/__tests__/**",
  "**/__fixtures__/**",
  # Covered by a subprocess smoke test because importing the executable would
  # bind process stdin and terminate the test process when input closes.
  "**/bin/**",
  # reason: interactive stdin loop / process.exit — entrypoint that reads stdin
  # line-by-line and exits the process on "end"; not unit-coverable.
  "**/src/server/run.ts",
]
