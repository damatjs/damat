name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Builds and tests everything that is actually committed: packages/** (the
  # framework) and backend/** (the default app). The modules/** workspaces are
  # gitignored (.gitignore: /modules), so they are NOT in a clean checkout and
  # cannot be tested here.
  #
  # The root test runner starts isolated PostgreSQL databases, then removes
  # their container after the package matrix. Redis live-server tests still
  # self-skip when REDIS_URL is unset.
  test:
    name: Build & test (packages)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      # The committed lockfile matches a clean checkout: the gitignored
      # `modules/*` workspaces are dev-only and are NOT recorded in bun.lock,
      # so a frozen install is reproducible here. If this step ever fails,
      # a lockfile generated with a local modules/* workspace present was
      # committed — regenerate bun.lock without it.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint packages
        run: bun run lint --filter='./packages/**'

      - name: Build packages
        run: bun run build --filter='./packages/**'

      - name: Test packages + default app
        run: bun run test --filter='./packages/**'
