name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Full repository release gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: damat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d damat_test"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frozen dependencies
        run: bun install --frozen-lockfile

      - name: Install PTY test runtime
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Install browser test runtime
        run: bunx playwright install --with-deps chromium

      # The legacy whole-repository 100-line cleanup is an explicit temporary
      # waiver. Changed files are still enforced by review and local checks.
      - name: Lint
        run: bun run lint --force

      - name: Type-check
        run: bun run check-types --force

      - name: Build
        run: bun run build --force

      - name: Test production site behavior and accessibility
        run: bun run test:sites

      - name: Test with managed PostgreSQL and Redis
        run: bun run test
        env:
          DAMAT_TEST_POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/damat_test
          DAMAT_TEST_REDIS_URL: redis://127.0.0.1:6379

      - name: Test interactive CLI fixtures under a pseudo-terminal
        shell: bash
        run: |
          script -q -e -c "bun run --cwd packages/cli/support test" /dev/null
          script -q -e -c "bun run --cwd packages/cli/app test" /dev/null
          script -q -e -c "bun run --cwd packages/cli/module test" /dev/null

      - name: Dependency, secret, and deployment security gates
        run: bun run check:security

      - name: Confirm reproducible checkout
        run: bun run check:release-clean
