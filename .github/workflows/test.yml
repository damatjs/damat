name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # Builds and tests everything that is actually committed: packages/** (the
  # framework) and backend/** (the default app). The modules/** workspaces are
  # gitignored (.gitignore: /modules), so they are NOT in a clean checkout and
  # cannot be tested here.
  #
  # No external services: tests that need a live database or redis self-skip
  # when their env var is unset — orm/pg's integration suite is
  # skipIf(!DATABASE_URL) and the redis live-server tests gate on REDIS_URL.
  # Everything else (the vast majority of the suite) is infra-free.
  test:
    name: Build & test (packages + default app)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      # NOT --frozen-lockfile: the root workspace globs include `modules/*`,
      # which are gitignored, so the committed lockfile records workspaces that
      # are absent from a clean checkout and a frozen install always reports
      # "lockfile had changes". A plain install resolves what is present.
      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build --filter='./packages/**'

      - name: Test packages + default app
        run: bun run test --filter='./packages/**' --filter='./backend/**'
