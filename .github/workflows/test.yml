name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Full repository release gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frozen dependencies
        run: bun install --frozen-lockfile

      # The legacy whole-repository 100-line cleanup is an explicit temporary
      # waiver. Changed files are still enforced by review and local checks.
      - name: Lint
        run: bun run lint --force

      - name: Type-check
        run: bun run check-types --force

      - name: Build
        run: bun run build --force

      - name: Test with managed PostgreSQL and Redis
        run: bun run test

      - name: Test interactive CLI fixtures under a pseudo-terminal
        shell: bash
        run: |
          script -q -e -c "bun run --cwd packages/cli/support test" /dev/null
          script -q -e -c "bun run --cwd packages/cli/app test" /dev/null
          script -q -e -c "bun run --cwd packages/cli/module test" /dev/null

      - name: Dependency, secret, and deployment security gates
        run: bun run check:security

      - name: Confirm reproducible checkout
        run: bun run check:release-clean
